<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lista de Casamento</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    
    <div id="lista-produtos"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>

    <div id="modal-nome" class="modal-container">
        <div class="modal-conteudo">
           <h3>Falta bem pouquinho!</h3>
           <p>Para organizarmos os presentes, informe o seu nome completo antes de ver a chave PIX:</p>
            
           <input type="text" id="nome-convidado" placeholder="Digite seu nome completo aqui..." required />
            
           <div class="modal-botoes">
             <button id="btn-cancelar-modal" class="botao">Voltar</button>
             <button id="btn-confirmar-modal" class="botao primario">Confirmar Presente</button>
           </div>
         </div>
    </div>
    
  </body>
</html>
